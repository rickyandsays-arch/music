<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.N Music - Web Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <nav class="sidebar">
            <div class="logo-circle"><span>R.N</span></div>
            <ul>
                <li class="active">🏠 Home</li>
                <li>🔍 Search</li>
                <li>📚 Your Library</li>
            </ul>
        </nav>

        <main class="content">
            <header>
                <h1>Good Evening</h1>
            </header>
            <div class="song-grid" id="songGrid">
                </div>
        </main>

        <footer class="player-bar">
            <div class="current-song">
                <div class="mini-logo">R.N</div>
                <div class="song-info">
                    <b id="track-name">Select a Song</b>
                    <p id="track-artist">Artist</p>
                </div>
            </div>
            
            <div class="player-controls">
                <div class="btns">
                    <button>⏮</button>
                    <button id="masterPlay" class="play-btn">▶</button>
                    <button>⏭</button>
                </div>
                <div class="progress-container">
                    <div class="progress"></div>
                </div>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
